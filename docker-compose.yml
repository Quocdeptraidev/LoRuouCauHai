services:
  # 1. Database (PostgreSQL + pgvector)
  db:
    image: pgvector/pgvector:pg16
    container_name: loruoucauhai-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loruoucauhai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loruoucauhai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Cache & Message Broker (Redis)
  redis:
    image: redis:7-alpine
    container_name: loruoucauhai-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Backend (FastAPI)
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: loruoucauhai-backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/loruoucauhai
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Mount code để dev reload hoạt động
      - ./apps/backend:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # 4. Frontend (React + Vite + Nginx)
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: loruoucauhai-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
